openapi: 3.0.3
info:
  title: Mellow Koala Collector Update API
  version: 1.0.0
  description: |
    API for Mellow collectors to publish configuration and collection snapshots to Mellow Koala.

servers:
  - url: http://localhost:3000

paths:
  /api/collectors/{collector_id}/configuration_snapshots:
    post:
      summary: Upload a configuration snapshot
      operationId: createConfigurationSnapshot
      security:
        - CollectorToken: []
      parameters:
        - name: collector_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotRequest'
      responses:
        '201':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotAccepted'
        '200':
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotAccepted'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown collector
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/collectors/{collector_id}/collection_snapshots:
    post:
      summary: Upload a collection snapshot
      operationId: createCollectionSnapshot
      security:
        - CollectorToken: []
      parameters:
        - name: collector_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotRequest'
      responses:
        '201':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotAccepted'
        '200':
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotAccepted'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown collector
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    CollectorToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    SnapshotRequest:
      type: object
      additionalProperties: true
      required: [snapshot_id, payload]
      properties:
        snapshot_id:
          type: string
          description: Idempotency identifier unique per collector and snapshot type
        captured_at:
          type: string
          format: date-time
          description: Optional producer timestamp
        payload:
          type: object
          additionalProperties: true
          description: Snapshot data; schema may evolve

    HeelerCollectionPayload:
      description: |
        Mellow Heeler WiFi AP beacon collection payload (Issue #25).
        Submitted as the `payload` field of a collection snapshot.
      type: object
      properties:
        geoLoc:
          type: object
          properties:
            site:
              type: string
              description: Site/location identifier
        platform:
          type: string
          description: Hardware platform (e.g. rpi3c)
        project:
          type: string
          description: Always "heeler" for Mellow Heeler payloads
        version:
          type: integer
          description: Payload format version
        wifi:
          type: array
          description: Observed WiFi AP beacons
          items:
            type: object
            properties:
              ssid:
                type: string
              bssid:
                type: string
              frequency_mhz:
                type: integer
              signal_dbm:
                type: integer
              capability:
                type: string
        zTime:
          type: integer
          description: Unix timestamp of observation
      example:
        geoLoc:
          site: anderson1
        platform: rpi3c
        project: heeler
        version: 1
        wifi:
          - bssid: "00:22:6b:81:03:d9"
            capability: unknown
            frequency_mhz: 2437
            signal_dbm: -86
            ssid: braingang2
        zTime: 1742095222

    SnapshotAccepted:
      type: object
      required: [status, collector_id, snapshot_id]
      properties:
        status:
          type: string
          enum: [accepted]
        collector_id:
          type: string
        snapshot_id:
          type: string
        received_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
