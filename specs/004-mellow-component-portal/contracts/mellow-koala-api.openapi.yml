openapi: 3.0.3
info:
  title: Mellow Koala Component Update API
  version: 1.0.0
  description: |
    API for Mellow components to publish configuration and collection snapshots to Mellow Koala.

servers:
  - url: http://localhost:3000

paths:
  /api/components/{component_id}/configuration_snapshots:
    post:
      summary: Upload a configuration snapshot
      operationId: createConfigurationSnapshot
      security:
        - ComponentToken: []
      parameters:
        - name: component_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotRequest'
      responses:
        '201':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotAccepted'
        '200':
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotAccepted'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown component
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/components/{component_id}/collection_snapshots:
    post:
      summary: Upload a collection snapshot
      operationId: createCollectionSnapshot
      security:
        - ComponentToken: []
      parameters:
        - name: component_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotRequest'
      responses:
        '201':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotAccepted'
        '200':
          description: Idempotent replay
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotAccepted'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown component
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Invalid authentication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    ComponentToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    SnapshotRequest:
      type: object
      additionalProperties: true
      required: [snapshot_id, payload]
      properties:
        snapshot_id:
          type: string
          description: Idempotency identifier unique per component and snapshot type
        captured_at:
          type: string
          format: date-time
          description: Optional producer timestamp
        payload:
          type: object
          additionalProperties: true
          description: Snapshot data; schema may evolve

    SnapshotAccepted:
      type: object
      required: [status, component_id, snapshot_id]
      properties:
        status:
          type: string
          enum: [accepted]
        component_id:
          type: string
        snapshot_id:
          type: string
        received_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
